name: AI Test Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Test Agent
        uses: harshith-56/UNIT-TEST-AGENT@v2
        with:
          llm_api_url: ${{ secrets.LLM_API_URL }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_model: ${{ secrets.LLM_MODEL }}

      - name: Clean Python cache files
        run: |
          if [ -d "unit_tests" ]; then
            find unit_tests -name "__pycache__" -type d -exec rm -rf {} +
            find unit_tests -name "*.pyc" -delete
          fi

      - name: Commit generated tests
        run: |
          git config user.name "harshith-56"
          git config user.email "harshithreddy3737@gmail.com"

          git add unit_tests || true

          if git diff --cached --quiet; then
            echo "No new tests generated"
            exit 0
          fi

          git commit -m "AI generated unit tests"
          git push origin HEAD:${{ github.head_ref }}
