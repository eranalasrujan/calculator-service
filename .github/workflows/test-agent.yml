name: AI Test Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Test Agent
        uses: harshith-56/UNIT-TEST-AGENT@v2
        with:
          llm_api_url: ${{ secrets.LLM_API_URL }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_model: ${{ secrets.LLM_MODEL }}

      - name: Move generated tests to unit_tests
        run: |
          mkdir -p unit_tests
          if [ -d "tests/ai_generated" ]; then
            cp -r tests/ai_generated/* unit_tests/ || true
          fi

      - name: Commit generated tests
        run: |
          git config user.name "harshith-56"
          git config user.email "harshithreddy3737@gmail.com"

          git add unit_tests

          if git diff --cached --quiet; then
            echo "No new tests generated"
          else
            git commit -m "AI generated unit tests"
            git push
          fi
